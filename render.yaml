services:
  - type: web
    name: junkshop-pos-website
    runtime: php
    plan: starter
    rootDir: web-admin
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan key:generate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      mkdir -p /tmp/storage
      mkdir -p /tmp/storage/framework
      mkdir -p /tmp/storage/framework/sessions
      mkdir -p /tmp/storage/framework/views
      mkdir -p /tmp/storage/framework/cache
      chmod -R 775 /tmp/storage
      php artisan migrate --force
      php artisan db:seed --force
      heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: junkshop-pos-website
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /tmp/database.sqlite

