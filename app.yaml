name: junkshop-pos-website
region: sgp
services:
  - name: web-admin
    source_dir: web-admin
    environment_slug: php
    build_command: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    run_command: |
      mkdir -p /workspace/storage/framework/{sessions,views,cache}
      chmod -R 775 /workspace/storage /workspace/bootstrap/cache
      php artisan migrate --force
      php artisan db:seed --force
      apache2-foreground
    envs:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /workspace/database/database.sqlite
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
